name: Build and Release All Platforms

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: linux-packages
            build_command: npx electron-builder --linux --publish never

          - os: windows-latest
            artifact_name: windows-installer
            build_command: npx electron-builder --win --publish never

          - os: macos-latest
            artifact_name: macos-installer
            build_command: npx electron-builder --mac --publish never

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install

      - name: Build ${{ matrix.os }}
        run: ${{ matrix.build_command }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Remove unwanted files (cleanup)
        run: |
          echo "Before cleanup:"
          ls -la release-files/
          
          rm -f release-files/*.yml release-files/*.yaml release-files/*.blockmap
          
          echo "After cleanup:"
          ls -la release-files/

      - name: Get version
        id: pkg_version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$PKG_VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg_version.outputs.VERSION }}
          name: Release v${{ steps.pkg_version.outputs.VERSION }}
          body: "AI Hub Desktop – cross-platform release."
          files: release-files/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          