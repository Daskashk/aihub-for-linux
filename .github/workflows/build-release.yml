name: Build and Release Linux

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-webkit2-4.1 \
                                  gir1.2-gtk-3.0 python3-pip patchelf

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build standalone binary
        run: |
          pyinstaller --onefile --name "aihub-desktop" \
                      --add-data "README.md:." \
                      app.py
          mv dist/aihub-desktop dist/aihub-desktop-x86_64.AppImage 2>/dev/null || true
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: List files
        run: ls -la release-files/

      - name: Get version
        id: pkg_version
        run: |
          PKG_VERSION=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          echo "VERSION=$PKG_VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg_version.outputs.VERSION }}
          name: Release v${{ steps.pkg_version.outputs.VERSION }}
          body: "AI Hub Desktop v${{ steps.pkg_version.outputs.VERSION }} – Linux native (GTK + WebKitGTK)."
          files: release-files/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
