<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none';"
    />
    <title>Service</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      webview {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <webview id="serviceWebview" src="about:blank" sandbox></webview>

    <script>
      // Get URL parameters
      const urlParams = new URLSearchParams(window.location.search);
      const serviceUrl = urlParams.get("url");

      // Load the service
      const webview = document.getElementById("serviceWebview");

      if (serviceUrl) {
        webview.setAttribute("src", serviceUrl);
      }

      // Handle webview events
      webview.addEventListener("did-start-loading", () => {
        console.log("Loading service...");
      });

      webview.addEventListener("did-finish-load", () => {
        console.log("Service loaded");
      });

      webview.addEventListener("did-fail-load", (event) => {
        console.error("Error loading service:", event.errorDescription);
      });

      // Handle new windows (popups) - open in default browser via IPC
      webview.addEventListener("new-window", (event) => {
        event.preventDefault();
        if (
          event.url &&
          (event.url.startsWith("http://") ||
            event.url.startsWith("https://")) &&
          window.electronAPI
        ) {
          window.electronAPI.openInBrowser(event.url).catch(() => {});
        }
      });
    </script>
  </body>
</html>
